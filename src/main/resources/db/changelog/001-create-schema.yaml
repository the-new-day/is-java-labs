databaseChangeLog:
  - changeSet:
      id: 001-create-schema
      author: the-new-day
      changes:
        - createTable:
            tableName: brands
            columns:
              - column: { name: id, type: uuid, constraints: { primaryKey: true, nullable: false } }
              - column: { name: created_at, type: timestamp with time zone, constraints: { nullable: false } }
              - column: { name: updated_at, type: timestamp with time zone, constraints: { nullable: false } }
              - column: { name: removed, type: boolean, defaultValueBoolean: false, constraints: { nullable: false } }
              - column: { name: name, type: varchar(120), constraints: { nullable: false, unique: true } }

        - createTable:
            tableName: users
            columns:
              - column: { name: id, type: uuid, constraints: { primaryKey: true, nullable: false } }
              - column: { name: created_at, type: timestamp with time zone, constraints: { nullable: false } }
              - column: { name: updated_at, type: timestamp with time zone, constraints: { nullable: false } }
              - column: { name: removed, type: boolean, defaultValueBoolean: false, constraints: { nullable: false } }
              - column: { name: full_name, type: varchar(255), constraints: { nullable: false } }
              - column: { name: role, type: varchar(40), constraints: { nullable: false } }

        - createTable:
            tableName: car_models
            columns:
              - column: { name: id, type: uuid, constraints: { primaryKey: true, nullable: false } }
              - column: { name: created_at, type: timestamp with time zone, constraints: { nullable: false } }
              - column: { name: updated_at, type: timestamp with time zone, constraints: { nullable: false } }
              - column: { name: removed, type: boolean, defaultValueBoolean: false, constraints: { nullable: false } }
              - column: { name: brand_id, type: uuid, constraints: { nullable: false } }
              - column: { name: model_name, type: varchar(120), constraints: { nullable: false } }
              - column: { name: base_price, type: "numeric(19,2)", constraints: { nullable: false } }
              - column: { name: body_type, type: varchar(40), constraints: { nullable: false } }
              - column: { name: fuel_type, type: varchar(40), constraints: { nullable: false } }
              - column: { name: drive_type, type: varchar(40), constraints: { nullable: false } }
              - column: { name: engine_volume, type: double precision, constraints: { nullable: false } }
              - column: { name: engine_power, type: int, constraints: { nullable: false } }
              - column: { name: base_transmission_type, type: varchar(40), constraints: { nullable: false } }

        - addForeignKeyConstraint:
            constraintName: fk_car_models_brand
            baseTableName: car_models
            baseColumnNames: brand_id
            referencedTableName: brands
            referencedColumnNames: id
        - addUniqueConstraint:
            constraintName: uk_car_models_brand_model_name
            tableName: car_models
            columnNames: brand_id, model_name

        - createTable:
            tableName: component_variants
            columns:
              - column: { name: id, type: uuid, constraints: { primaryKey: true, nullable: false } }
              - column: { name: created_at, type: timestamp with time zone, constraints: { nullable: false } }
              - column: { name: updated_at, type: timestamp with time zone, constraints: { nullable: false } }
              - column: { name: removed, type: boolean, defaultValueBoolean: false, constraints: { nullable: false } }
              - column: { name: component_type, type: varchar(40), constraints: { nullable: false } }
              - column: { name: name, type: varchar(160), constraints: { nullable: false } }
              - column: { name: surcharge, type: "numeric(19,2)", constraints: { nullable: false } }

        - addUniqueConstraint:
            constraintName: uk_component_variants_type_name
            tableName: component_variants
            columnNames: component_type, name

        - createTable:
            tableName: component_variant_compatible_models
            columns:
              - column: { name: id, type: uuid, constraints: { primaryKey: true, nullable: false } }
              - column: { name: created_at, type: timestamp with time zone, constraints: { nullable: false } }
              - column: { name: updated_at, type: timestamp with time zone, constraints: { nullable: false } }
              - column: { name: removed, type: boolean, defaultValueBoolean: false, constraints: { nullable: false } }
              - column: { name: component_variant_id, type: uuid, constraints: { nullable: false } }
              - column: { name: car_model_id, type: uuid, constraints: { nullable: false } }

        - addForeignKeyConstraint:
            constraintName: fk_component_compatibility_variant
            baseTableName: component_variant_compatible_models
            baseColumnNames: component_variant_id
            referencedTableName: component_variants
            referencedColumnNames: id
        - addForeignKeyConstraint:
            constraintName: fk_component_compatibility_model
            baseTableName: component_variant_compatible_models
            baseColumnNames: car_model_id
            referencedTableName: car_models
            referencedColumnNames: id
        - addUniqueConstraint:
            constraintName: uk_component_variant_model_compatibility
            tableName: component_variant_compatible_models
            columnNames: component_variant_id, car_model_id

        - createTable:
            tableName: car_model_base_component_variants
            columns:
              - column: { name: id, type: uuid, constraints: { primaryKey: true, nullable: false } }
              - column: { name: created_at, type: timestamp with time zone, constraints: { nullable: false } }
              - column: { name: updated_at, type: timestamp with time zone, constraints: { nullable: false } }
              - column: { name: removed, type: boolean, defaultValueBoolean: false, constraints: { nullable: false } }
              - column: { name: car_model_id, type: uuid, constraints: { nullable: false } }
              - column: { name: component_type, type: varchar(40), constraints: { nullable: false } }
              - column: { name: component_variant_id, type: uuid, constraints: { nullable: false } }

        - addForeignKeyConstraint:
            constraintName: fk_car_model_base_component_model
            baseTableName: car_model_base_component_variants
            baseColumnNames: car_model_id
            referencedTableName: car_models
            referencedColumnNames: id
        - addForeignKeyConstraint:
            constraintName: fk_car_model_base_component_variant
            baseTableName: car_model_base_component_variants
            baseColumnNames: component_variant_id
            referencedTableName: component_variants
            referencedColumnNames: id
        - addUniqueConstraint:
            constraintName: uk_car_model_base_component_type
            tableName: car_model_base_component_variants
            columnNames: car_model_id, component_type

        - createTable:
            tableName: car_model_configurable_component_types
            columns:
              - column: { name: id, type: uuid, constraints: { primaryKey: true, nullable: false } }
              - column: { name: created_at, type: timestamp with time zone, constraints: { nullable: false } }
              - column: { name: updated_at, type: timestamp with time zone, constraints: { nullable: false } }
              - column: { name: removed, type: boolean, defaultValueBoolean: false, constraints: { nullable: false } }
              - column: { name: car_model_id, type: uuid, constraints: { nullable: false } }
              - column: { name: component_type, type: varchar(40), constraints: { nullable: false } }

        - addForeignKeyConstraint:
            constraintName: fk_car_model_configurable_component_model
            baseTableName: car_model_configurable_component_types
            baseColumnNames: car_model_id
            referencedTableName: car_models
            referencedColumnNames: id
        - addUniqueConstraint:
            constraintName: uk_car_model_configurable_component_type
            tableName: car_model_configurable_component_types
            columnNames: car_model_id, component_type

        - createTable:
            tableName: configurations
            columns:
              - column: { name: id, type: uuid, constraints: { primaryKey: true, nullable: false } }
              - column: { name: created_at, type: timestamp with time zone, constraints: { nullable: false } }
              - column: { name: updated_at, type: timestamp with time zone, constraints: { nullable: false } }
              - column: { name: removed, type: boolean, defaultValueBoolean: false, constraints: { nullable: false } }
              - column: { name: car_model_id, type: uuid, constraints: { nullable: false } }

        - addForeignKeyConstraint:
            constraintName: fk_configurations_car_model
            baseTableName: configurations
            baseColumnNames: car_model_id
            referencedTableName: car_models
            referencedColumnNames: id

        - createTable:
            tableName: configuration_component_variants
            columns:
              - column: { name: id, type: uuid, constraints: { primaryKey: true, nullable: false } }
              - column: { name: created_at, type: timestamp with time zone, constraints: { nullable: false } }
              - column: { name: updated_at, type: timestamp with time zone, constraints: { nullable: false } }
              - column: { name: removed, type: boolean, defaultValueBoolean: false, constraints: { nullable: false } }
              - column: { name: configuration_id, type: uuid, constraints: { nullable: false } }
              - column: { name: component_type, type: varchar(40), constraints: { nullable: false } }
              - column: { name: component_variant_id, type: uuid, constraints: { nullable: false } }

        - addForeignKeyConstraint:
            constraintName: fk_configuration_component_configuration
            baseTableName: configuration_component_variants
            baseColumnNames: configuration_id
            referencedTableName: configurations
            referencedColumnNames: id
        - addForeignKeyConstraint:
            constraintName: fk_configuration_component_variant
            baseTableName: configuration_component_variants
            baseColumnNames: component_variant_id
            referencedTableName: component_variants
            referencedColumnNames: id
        - addUniqueConstraint:
            constraintName: uk_configuration_component_type
            tableName: configuration_component_variants
            columnNames: configuration_id, component_type

        - createTable:
            tableName: cars
            columns:
              - column: { name: id, type: uuid, constraints: { primaryKey: true, nullable: false } }
              - column: { name: created_at, type: timestamp with time zone, constraints: { nullable: false } }
              - column: { name: updated_at, type: timestamp with time zone, constraints: { nullable: false } }
              - column: { name: removed, type: boolean, defaultValueBoolean: false, constraints: { nullable: false } }
              - column: { name: vin, type: varchar(17), constraints: { nullable: false, unique: true } }
              - column: { name: configuration_id, type: uuid, constraints: { nullable: false, unique: true } }
              - column: { name: color, type: varchar(40), constraints: { nullable: false } }
              - column: { name: test_drive_available, type: boolean, defaultValueBoolean: false, constraints: { nullable: false } }

        - addForeignKeyConstraint:
            constraintName: fk_cars_configuration
            baseTableName: cars
            baseColumnNames: configuration_id
            referencedTableName: configurations
            referencedColumnNames: id

        - createTable:
            tableName: spare_parts
            columns:
              - column: { name: id, type: uuid, constraints: { primaryKey: true, nullable: false } }
              - column: { name: created_at, type: timestamp with time zone, constraints: { nullable: false } }
              - column: { name: updated_at, type: timestamp with time zone, constraints: { nullable: false } }
              - column: { name: removed, type: boolean, defaultValueBoolean: false, constraints: { nullable: false } }
              - column: { name: name, type: varchar(160), constraints: { nullable: false } }
              - column: { name: price, type: "numeric(19,2)", constraints: { nullable: false } }

        - createTable:
            tableName: spare_part_compatible_models
            columns:
              - column: { name: id, type: uuid, constraints: { primaryKey: true, nullable: false } }
              - column: { name: created_at, type: timestamp with time zone, constraints: { nullable: false } }
              - column: { name: updated_at, type: timestamp with time zone, constraints: { nullable: false } }
              - column: { name: removed, type: boolean, defaultValueBoolean: false, constraints: { nullable: false } }
              - column: { name: spare_part_id, type: uuid, constraints: { nullable: false } }
              - column: { name: car_model_id, type: uuid, constraints: { nullable: false } }

        - addForeignKeyConstraint:
            constraintName: fk_spare_part_compatibility_part
            baseTableName: spare_part_compatible_models
            baseColumnNames: spare_part_id
            referencedTableName: spare_parts
            referencedColumnNames: id
        - addForeignKeyConstraint:
            constraintName: fk_spare_part_compatibility_model
            baseTableName: spare_part_compatible_models
            baseColumnNames: car_model_id
            referencedTableName: car_models
            referencedColumnNames: id
        - addUniqueConstraint:
            constraintName: uk_spare_part_model_compatibility
            tableName: spare_part_compatible_models
            columnNames: spare_part_id, car_model_id

        - createTable:
            tableName: stock_car_orders
            columns:
              - column: { name: id, type: uuid, constraints: { primaryKey: true, nullable: false } }
              - column: { name: created_at, type: timestamp with time zone, constraints: { nullable: false } }
              - column: { name: updated_at, type: timestamp with time zone, constraints: { nullable: false } }
              - column: { name: removed, type: boolean, defaultValueBoolean: false, constraints: { nullable: false } }
              - column: { name: client_id, type: uuid, constraints: { nullable: false } }
              - column: { name: manager_id, type: uuid, constraints: { nullable: false } }
              - column: { name: car_id, type: uuid, constraints: { nullable: false } }
              - column: { name: status, type: varchar(40), constraints: { nullable: false } }

        - addForeignKeyConstraint:
            constraintName: fk_stock_orders_client
            baseTableName: stock_car_orders
            baseColumnNames: client_id
            referencedTableName: users
            referencedColumnNames: id
        - addForeignKeyConstraint:
            constraintName: fk_stock_orders_manager
            baseTableName: stock_car_orders
            baseColumnNames: manager_id
            referencedTableName: users
            referencedColumnNames: id
        - addForeignKeyConstraint:
            constraintName: fk_stock_orders_car
            baseTableName: stock_car_orders
            baseColumnNames: car_id
            referencedTableName: cars
            referencedColumnNames: id

        - createTable:
            tableName: custom_car_orders
            columns:
              - column: { name: id, type: uuid, constraints: { primaryKey: true, nullable: false } }
              - column: { name: created_at, type: timestamp with time zone, constraints: { nullable: false } }
              - column: { name: updated_at, type: timestamp with time zone, constraints: { nullable: false } }
              - column: { name: removed, type: boolean, defaultValueBoolean: false, constraints: { nullable: false } }
              - column: { name: client_id, type: uuid, constraints: { nullable: false } }
              - column: { name: manager_id, type: uuid, constraints: { nullable: false } }
              - column: { name: configuration_id, type: uuid, constraints: { nullable: false, unique: true } }
              - column: { name: status, type: varchar(40), constraints: { nullable: false } }

        - addForeignKeyConstraint:
            constraintName: fk_custom_orders_client
            baseTableName: custom_car_orders
            baseColumnNames: client_id
            referencedTableName: users
            referencedColumnNames: id
        - addForeignKeyConstraint:
            constraintName: fk_custom_orders_manager
            baseTableName: custom_car_orders
            baseColumnNames: manager_id
            referencedTableName: users
            referencedColumnNames: id
        - addForeignKeyConstraint:
            constraintName: fk_custom_orders_configuration
            baseTableName: custom_car_orders
            baseColumnNames: configuration_id
            referencedTableName: configurations
            referencedColumnNames: id

        - createTable:
            tableName: test_drive_requests
            columns:
              - column: { name: id, type: uuid, constraints: { primaryKey: true, nullable: false } }
              - column: { name: created_at, type: timestamp with time zone, constraints: { nullable: false } }
              - column: { name: updated_at, type: timestamp with time zone, constraints: { nullable: false } }
              - column: { name: removed, type: boolean, defaultValueBoolean: false, constraints: { nullable: false } }
              - column: { name: client_id, type: uuid, constraints: { nullable: false } }
              - column: { name: car_id, type: uuid, constraints: { nullable: false } }
              - column: { name: starts_at, type: timestamp, constraints: { nullable: false } }

        - addForeignKeyConstraint:
            constraintName: fk_test_drive_requests_client
            baseTableName: test_drive_requests
            baseColumnNames: client_id
            referencedTableName: users
            referencedColumnNames: id
        - addForeignKeyConstraint:
            constraintName: fk_test_drive_requests_car
            baseTableName: test_drive_requests
            baseColumnNames: car_id
            referencedTableName: cars
            referencedColumnNames: id

  - changeSet:
      id: 002-create-query-indexes
      author: the-new-day
      changes:
        - createIndex:
            indexName: idx_car_models_brand_id
            tableName: car_models
            columns:
              - column: { name: brand_id }
        - createIndex:
            indexName: idx_component_compatibility_model_id
            tableName: component_variant_compatible_models
            columns:
              - column: { name: car_model_id }
        - createIndex:
            indexName: idx_car_model_base_component_variant_id
            tableName: car_model_base_component_variants
            columns:
              - column: { name: component_variant_id }
        - createIndex:
            indexName: idx_configuration_components_variant_id
            tableName: configuration_component_variants
            columns:
              - column: { name: component_variant_id }
        - createIndex:
            indexName: idx_cars_configuration_id
            tableName: cars
            columns:
              - column: { name: configuration_id }
        - createIndex:
            indexName: idx_spare_part_compatibility_model_id
            tableName: spare_part_compatible_models
            columns:
              - column: { name: car_model_id }
        - createIndex:
            indexName: idx_stock_orders_client_id
            tableName: stock_car_orders
            columns:
              - column: { name: client_id }
        - createIndex:
            indexName: idx_stock_orders_manager_id
            tableName: stock_car_orders
            columns:
              - column: { name: manager_id }
        - createIndex:
            indexName: idx_custom_orders_client_id
            tableName: custom_car_orders
            columns:
              - column: { name: client_id }
        - createIndex:
            indexName: idx_custom_orders_manager_id
            tableName: custom_car_orders
            columns:
              - column: { name: manager_id }
        - createIndex:
            indexName: idx_test_drive_requests_car_id
            tableName: test_drive_requests
            columns:
              - column: { name: car_id }
