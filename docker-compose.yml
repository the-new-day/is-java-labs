services:
  postgres:
    image: postgres:16-alpine
    container_name: dealership-postgres
    environment:
      POSTGRES_DB: dealership
      POSTGRES_USER: dealership
      POSTGRES_PASSWORD: dealership
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dealership -d dealership"]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.5
    container_name: dealership-keycloak
    command: ["start-dev", "--import-realm"]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
      KC_HTTP_PORT: 8080
    ports:
      - "8081:8080"
    volumes:
      - ./docker/keycloak:/opt/keycloak/data/import:ro
      - keycloak_data:/opt/keycloak/data
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '\"status\": \"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: dealership-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/dealership
      SPRING_DATASOURCE_USERNAME: dealership
      SPRING_DATASOURCE_PASSWORD: dealership
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/dealership
      KEYCLOAK_SERVER_URL: http://keycloak:8080
      KEYCLOAK_REALM: dealership
      KEYCLOAK_ADMIN_CLIENT_ID: dealership-admin
      KEYCLOAK_ADMIN_CLIENT_SECRET: dealership-admin-secret
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy

volumes:
  postgres_data:
  keycloak_data:
