services:
  order-db:
    image: postgres:16-alpine
    container_name: order-db
    environment:
      POSTGRES_DB: order_db
      POSTGRES_USER: order_service
      POSTGRES_PASSWORD: order_service
    ports:
      - "5433:5432"
    volumes:
      - order_db_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U order_service -d order_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  storage-db:
    image: postgres:16-alpine
    container_name: storage-db
    environment:
      POSTGRES_DB: storage_db
      POSTGRES_USER: storage_service
      POSTGRES_PASSWORD: storage_service
    ports:
      - "5434:5432"
    volumes:
      - storage_db_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U storage_service -d storage_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.5
    container_name: dealership-keycloak
    command: [ "start-dev", "--import-realm" ]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
      KC_HTTP_PORT: 8080
    ports:
      - "8085:8080"
    volumes:
      - ./docker/keycloak:/opt/keycloak/data/import:ro
      - keycloak_data:/opt/keycloak/data
    healthcheck:
      test: [ "CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '\"status\": \"UP\"'" ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: dealership-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    ports:
      - "9092:9092"
    healthcheck:
      test: [ "CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  order-service:
    build:
      context: .
      dockerfile: docker/order-service/Dockerfile
    container_name: order-service
    ports:
      - "8081:8081"
    environment:
      DB_HOST: order-db
      DB_PORT: 5432
      DB_USER: order_service
      DB_PASSWORD: order_service
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/dealership
      KEYCLOAK_SERVER_URL: http://keycloak:8080
      KEYCLOAK_REALM: dealership
      KEYCLOAK_ADMIN_CLIENT_ID: dealership-admin
      KEYCLOAK_ADMIN_CLIENT_SECRET: dealership-admin-secret
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      STORAGE_GRPC_HOST: storage-service
      STORAGE_GRPC_PORT: 9090
    depends_on:
      order-db:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      kafka:
        condition: service_healthy
      storage-service:
        condition: service_started

  storage-service:
    build:
      context: .
      dockerfile: docker/storage-service/Dockerfile
    container_name: storage-service
    ports:
      - "8082:8082"
      - "9090:9090"
    environment:
      DB_HOST: storage-db
      DB_PORT: 5432
      DB_USER: storage_service
      DB_PASSWORD: storage_service
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/dealership
      KEYCLOAK_SERVER_URL: http://keycloak:8080
      KEYCLOAK_REALM: dealership
      KEYCLOAK_ADMIN_CLIENT_ID: dealership-admin
      KEYCLOAK_ADMIN_CLIENT_SECRET: dealership-admin-secret
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      storage-db:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      kafka:
        condition: service_healthy

volumes:
  order_db_data:
  storage_db_data:
  keycloak_data:
