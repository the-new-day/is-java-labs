services:
  postgres:
    image: postgres:16-alpine
    container_name: dealership-postgres
    environment:
      POSTGRES_DB: dealership
      POSTGRES_USER: dealership
      POSTGRES_PASSWORD: dealership
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dealership -d dealership"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: dealership-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/dealership
      SPRING_DATASOURCE_USERNAME: dealership
      SPRING_DATASOURCE_PASSWORD: dealership
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
