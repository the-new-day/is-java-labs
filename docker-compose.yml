services:
  postgres:
    image: postgres:16-alpine
    container_name: dealership-postgres
    environment:
      POSTGRES_DB: dealership
      POSTGRES_USER: dealership
      POSTGRES_PASSWORD: dealership
    ports:
      - "5432:5432"
    volumes:
      - dealership-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dealership -d dealership"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  dealership-postgres-data:
