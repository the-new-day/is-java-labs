spring:
  application:
    name: order-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/order_db
    username: ${DB_USER:order_service}
    password: ${DB_PASSWORD:order_service}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/dealership}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
    consumer:
      group-id: order-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: org.dealership.events
        spring.json.use.type.headers: false

server:
  port: 8081

dealership:
  security:
    keycloak:
      server-url: ${KEYCLOAK_SERVER_URL:http://localhost:8080}
      realm: ${KEYCLOAK_REALM:dealership}
      manager-realm-role: MANAGER
      admin-client-id: ${KEYCLOAK_ADMIN_CLIENT_ID:dealership-admin}
      admin-client-secret: ${KEYCLOAK_ADMIN_CLIENT_SECRET:dealership-admin-secret}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
