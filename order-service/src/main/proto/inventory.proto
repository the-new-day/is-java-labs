syntax = "proto3";

package dealership.inventory.v1;

option java_package = "org.dealership.grpc.inventory";
option java_multiple_files = true;

service InventoryService {
  rpc ListAvailableCars (ListAvailableCarsRequest) returns (ListAvailableCarsResponse);
  rpc GetAvailableCar (GetAvailableCarRequest) returns (GetAvailableCarResponse);
}

message ListAvailableCarsRequest {}

message ListAvailableCarsResponse {
  repeated AvailableCar cars = 1;
}

message GetAvailableCarRequest {
  string id = 1;
}

message GetAvailableCarResponse {
  AvailableCar car = 1;
}

message AvailableCar {
  string id = 1;
  string brand_name = 2;
  string model_name = 3;
  string color = 4;
  string price_amount = 5;
}
